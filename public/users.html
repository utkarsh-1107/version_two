<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>User Management | Blazing Barbecue</title>
  <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="96x96" href="/icons/favicon-96x96.png" />
  <link rel="icon" type="image/svg+xml" href="/icons/favicon.svg" />
  <link rel="icon" href="/icons/favicon.ico" />
  <link rel="manifest" href="/icons/site.webmanifest" />
  <link rel="stylesheet" href="/users.css?v=20260321a" />
  <link rel="stylesheet" href="/components/layout/layout.css?v=20260321a" />
</head>
<body>
  <div data-page-root>
  <main class="users-main">
    <section class="panel">
      <h2>Create User</h2>
      <form id="create-user-form" class="create-form" action="javascript:void(0);">
        <input id="new-name" type="text" placeholder="Display name" />
        <input id="new-username" type="text" placeholder="Username (3-32 chars)" required />
        <input id="new-password" type="password" placeholder="Password" required />
        <select id="new-role">
          <option value="user">User</option>
          <option value="admin">Admin</option>
        </select>
        <button class="btn" type="submit">Create</button>
      </form>
      <p id="create-message" class="message"></p>
    </section>

    <section class="panel">
      <h2>Users</h2>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Name</th>
              <th>Username</th>
              <th>Role</th>
              <th>New Password</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="users-tbody"></tbody>
        </table>
      </div>
      <p id="users-message" class="message"></p>
    </section>
  </main>
  </div>

  <script src="/components/layout/Header.js?v=20260321b"></script>
  <script src="/components/layout/Sidebar.js?v=20260321b"></script>
  <script src="/components/layout/POSLayout.js?v=20260321b"></script>
  <script src="/components/layout/AdminLayout.js?v=20260321b"></script>
  <script src="/components/layout/AppLayoutRouter.js?v=20260321b"></script>
  <script>
    window.AppLayoutRouter.mount();
  </script>
  <script src="/users.js?v=20260321a"></script>
</body>
</html>
