<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Order History | Blazing Barbecue</title>
  <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="96x96" href="/icons/favicon-96x96.png" />
  <link rel="icon" type="image/svg+xml" href="/icons/favicon.svg" />
  <link rel="icon" href="/icons/favicon.ico" />
  <link rel="manifest" href="/icons/site.webmanifest" />
  <link rel="stylesheet" href="/orders-history.css?v=20260328c" />
  <link rel="stylesheet" href="/components/layout/layout.css?v=20260321a" />
</head>
<body>
  <div data-page-root>
  <main class="history-page">
    <header class="history-header">
      <div>
        <h1>Order History</h1>
        <p>Completed orders from the last 7 days.</p>
      </div>
    </header>

    <section class="panel">
      <div class="filters-row">
        <div class="date-wrap">
          <label for="history-date">Date</label>
          <input id="history-date" type="date" />
        </div>
        <button id="apply-filter-btn" class="btn btn-primary" type="button">Apply</button>
        <button id="clear-filter-btn" class="btn btn-secondary" type="button">Clear</button>
      </div>
      <p id="history-message" class="message"></p>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Order ID</th>
              <th>Date</th>
              <th>Total</th>
              <th>Type</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="history-table-body"></tbody>
        </table>
      </div>
      <div class="pager">
        <button id="prev-page-btn" class="btn btn-secondary" type="button">Prev</button>
        <span id="page-meta">Page 1</span>
        <button id="next-page-btn" class="btn btn-secondary" type="button">Next</button>
      </div>
    </section>
  </main>
  </div>

  <div id="order-detail-modal" class="modal hidden" aria-hidden="true">
    <div class="modal-content">
      <button id="close-detail-modal-btn" class="modal-close" type="button" aria-label="Close">x</button>
      <h2>Order Details</h2>
      <div id="order-detail-content" class="detail-content"></div>
    </div>
  </div>

  <script src="/components/layout/Header.js?v=20260321b"></script>
  <script src="/components/layout/Sidebar.js?v=20260328a"></script>
  <script src="/components/layout/POSLayout.js?v=20260321b"></script>
  <script src="/components/layout/AdminLayout.js?v=20260321b"></script>
  <script src="/components/layout/AppLayoutRouter.js?v=20260321b"></script>
  <script>
    window.AppLayoutRouter.mount();
  </script>
  <script src="/orders-history.js?v=20260328d"></script>
</body>
</html>
