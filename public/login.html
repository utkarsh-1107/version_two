<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In | Blazing Barbecue</title>
  <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="96x96" href="/icons/favicon-96x96.png" />
  <link rel="icon" type="image/svg+xml" href="/icons/favicon.svg" />
  <link rel="icon" href="/icons/favicon.ico" />
  <link rel="manifest" href="/icons/site.webmanifest" />
  <link rel="stylesheet" href="/login.css" />
</head>
<body>
  <main class="login-page">
    <section class="login-shell">
      <h1>BLAZING BARBECUE</h1>
      <p class="subtitle">Food POS Sign In</p>
      <form id="login-form" class="login-form" action="javascript:void(0);">
        <label for="username">Username</label>
        <input id="username" name="username" type="text" autocomplete="username" required />

        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required />

        <p id="login-error" class="error"></p>
        <button id="login-submit-btn" class="login-btn" type="submit">Sign In</button>
      </form>
    </section>
  </main>
  <script src="/login.js"></script>
</body>
</html>
