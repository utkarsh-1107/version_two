<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Menu Management | Blazing Barbecue</title>
  <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="96x96" href="/icons/favicon-96x96.png" />
  <link rel="icon" type="image/svg+xml" href="/icons/favicon.svg" />
  <link rel="icon" href="/icons/favicon.ico" />
  <link rel="manifest" href="/icons/site.webmanifest" />
  <link rel="stylesheet" href="/menu-management.css?v=20260321i" />
  <link rel="stylesheet" href="/components/layout/layout.css?v=20260321a" />
</head>
<body>
  <div data-page-root>
  <main class="menu-main">
    <section class="panel">
      <h2>Create Menu Item</h2>
      <form id="create-menu-form" class="menu-form" action="javascript:void(0);">
        <input id="create-name" type="text" placeholder="Item Name" required />
        <input id="create-price" type="number" min="0" step="0.01" placeholder="Price" required />
        <select id="create-category" required>
          <option value="Appetizers">Appetizers</option>
          <option value="Wraps">Wraps</option>
          <option value="Wings">Wings</option>
          <option value="Sandwiches">Sandwiches</option>
          <option value="Hot Dogs">Hot Dogs</option>
          <option value="Full Leg">Full Leg</option>
          <option value="Drumsticks">Drumsticks</option>
          <option value="Extras">Extras</option>
        </select>
        <input id="create-prep-time" type="number" min="0" step="1" value="10" placeholder="Prep Time (mins)" required />
        <textarea id="create-description" rows="2" placeholder="Description (optional)"></textarea>
        <input id="create-image" type="file" accept="image/*" />

        <div class="flag-grid">
          <label><input id="create-peri" type="checkbox" /> Peri Peri</label>
          <label><input id="create-cheese" type="checkbox" /> Cheese</label>
          <label><input id="create-tandoori" type="checkbox" /> Tandoori</label>
          <label><input id="create-in-stock" type="checkbox" checked /> Available</label>
        </div>

        <button class="btn create-btn" type="submit">Create Item</button>
      </form>
      <p id="create-message" class="message"></p>
    </section>

    <section class="panel">
      <h2>Menu Management</h2>
      <div class="menu-view-tabs" role="tablist" aria-label="Menu views">
        <button id="structured-view-tab" class="menu-view-tab active" type="button" data-menu-view="structured" role="tab" aria-selected="true">Menu Management</button>
        <button id="fallback-view-tab" class="menu-view-tab" type="button" data-menu-view="fallback" role="tab" aria-selected="false">Manage Menu Items (Fallback)</button>
      </div>

      <div id="menu-structured-panel" class="menu-view-panel" role="tabpanel" aria-labelledby="structured-view-tab">
        <div id="category-grid" class="category-grid"></div>
        <section id="active-category-items-wrap" class="category-items-wrap hidden" aria-live="polite">
          <h3 id="active-category-items-title" class="category-title"></h3>
          <div id="active-category-items" class="category-items"></div>
        </section>
      </div>

      <div id="menu-fallback-panel" class="menu-view-panel hidden" role="tabpanel" aria-labelledby="fallback-view-tab">
        <div id="menu-category-sections" class="menu-category-sections"></div>
      </div>

      <p id="items-message" class="message"></p>
    </section>
  </main>

  <div id="menu-item-modal" class="modal hidden" aria-hidden="true">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="modal-title">Item Details</h3>
        <button id="modal-close-btn" class="icon-btn" type="button" aria-label="Close">x</button>
      </div>
      <div id="modal-body" class="modal-body"></div>
    </div>
  </div>
  <div id="soft-toast" class="soft-toast" aria-live="polite" aria-atomic="true"></div>
  </div>

  <script src="/components/layout/Header.js?v=20260321b"></script>
  <script src="/components/layout/Sidebar.js?v=20260321b"></script>
  <script src="/components/layout/POSLayout.js?v=20260321b"></script>
  <script src="/components/layout/AdminLayout.js?v=20260321b"></script>
  <script src="/components/layout/AppLayoutRouter.js?v=20260321b"></script>
  <script>
    window.AppLayoutRouter.mount();
  </script>
  <script src="/menu-management.js?v=20260321j"></script>
</body>
</html>
