<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily Close Report | Blazing Barbecue</title>
  <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="96x96" href="/icons/favicon-96x96.png" />
  <link rel="icon" type="image/svg+xml" href="/icons/favicon.svg" />
  <link rel="icon" href="/icons/favicon.ico" />
  <link rel="manifest" href="/icons/site.webmanifest" />
  <link rel="stylesheet" href="/daily-close-report.css?v=20260321a" />
  <link rel="stylesheet" href="/components/layout/layout.css?v=20260321a" />
</head>
<body>
  <div data-page-root>
  <main class="report-main">
    <section class="card report-intro">
      <p class="eyebrow">Business Intelligence</p>
      <h1>Daily Close Report</h1>
      <p class="subtitle">Track sales health, order flow, and item performance for a selected day.</p>
    </section>

    <section class="toolbar card">
      <div class="date-wrap">
        <label for="report-date">Report Date</label>
        <input id="report-date" type="date" />
      </div>
      <div class="toolbar-actions">
        <button id="refresh-report-btn" class="btn btn-secondary" type="button">Refresh</button>
        <button id="download-pdf-btn" class="btn btn-primary" type="button">Download PDF</button>
        <button id="print-report-btn" class="btn btn-ghost" type="button">Print Report</button>
      </div>
    </section>

    <section id="summary-cards" class="summary-cards"></section>

    <section class="grid-two">
      <article class="card chart-card">
        <h2>Orders by Status</h2>
        <canvas id="status-chart" height="150"></canvas>
      </article>
      <article class="card chart-card">
        <h2>Orders by Type</h2>
        <canvas id="type-chart" height="150"></canvas>
      </article>
      <article class="card chart-card">
        <h2>Payment Split</h2>
        <canvas id="payment-chart" height="150"></canvas>
      </article>
      <article class="card insights-card">
        <h2>Business Insights</h2>
        <div id="business-insights"></div>
      </article>
    </section>

    <section class="grid-two">
      <article class="card top-selling-card">
        <h2>Top Selling Items</h2>
        <p id="most-consumed" class="most-consumed"></p>
        <div class="top-selling-list" id="top-items-list"></div>
      </article>
      <article class="card">
        <h2>Recommendations</h2>
        <ul id="recommendation-list" class="recommendation-list"></ul>
      </article>
    </section>

    <p id="report-message" class="report-message"></p>
  </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="/components/layout/Header.js?v=20260321b"></script>
  <script src="/components/layout/Sidebar.js?v=20260321b"></script>
  <script src="/components/layout/POSLayout.js?v=20260321b"></script>
  <script src="/components/layout/AdminLayout.js?v=20260321b"></script>
  <script src="/components/layout/AppLayoutRouter.js?v=20260321b"></script>
  <script>
    window.AppLayoutRouter.mount();
  </script>
  <script src="/daily-close-report.js?v=20260321a"></script>
</body>
</html>
